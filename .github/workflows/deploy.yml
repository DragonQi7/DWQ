name: Deploy Branch to GitHub Pages

on:
  push:
    branches:
      - dev
      - staging
      - prod

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p public
          cp index.html public/
          if [ -f qigong.html ]; then cp qigong.html public/; fi
          if [ -d images ]; then cp -r images public/; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy
        uses: actions/deploy-pages@v4
        with:
          # unique deployment per branch
          branch: ${{ github.ref_name }}
          folder: public
